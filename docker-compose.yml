services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-caustier}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-caustier_sav}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-caustier} -d ${POSTGRES_DB:-caustier_sav}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-caustier}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-caustier_sav}
      DIRECT_DATABASE_URL: postgresql://${POSTGRES_USER:-caustier}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-caustier_sav}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:3000}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
